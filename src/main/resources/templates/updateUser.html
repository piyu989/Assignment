<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User</title>
</head>
<body>
    <div class="container">
        <h2>Update User</h2>
		<form 
         th:action="@{/updateUser}"
         method="post"
         th:object="${user}"
        >
		
            
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" th:field="*{firstName}" class="form-control" />
            </div>

			<div class="form-group">
                <label for="lastName">Last Name:</label>
                <input th:field="*{lastName}" type="text" id="lastName" name="lastName" placeholder="Enter your last name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input th:field="*{email}" type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone No:</label>
                <input th:field="*{phone}" type="text" id="phone" name="phone" placeholder="Enter your phone number">
            </div>
            
            <div class="form-group">
                <label for="street">Street:</label>
                <input th:field="*{street}" type="text" id="street" name="street" placeholder="Enter your street">
            </div>
            
            <div class="form-group">
                <label for="address">Address:</label>
                <input th:field="*{address}" type="text" id="address" name="address" placeholder="Enter your address">
            </div>
            
            <div class="form-group">
                <label for="state">State</label>
                <input th:field="*{state}" type="text" id="state" name="state" placeholder="Enter your state">
            </div>
            
	
            <button type="submit" class="btn btn-primary">Update</button>
        </form>
    </div>
</body>
</html>
